<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الذكية لتعلم الإنجليزية Pro</title>
    <style>
        /* ==========================================================================
           1. المتغيرات والألوان العصرية والتفاعلية (CSS Variables)
           ========================================================================== */
        :root {
            --primary: #3b82f6; /* اللون الأساسي، سيتغير ديناميكياً */
            --dark: #0f172a;
            --text-main: #1e293b;
            --text-muted: #475569;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --white-glass: rgba(255, 255, 255, 0.7);
            --modal-glass: rgba(15, 23, 42, 0.85);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gold: #ffd700;
            --us-color: #2563eb;
            --us-bg: rgba(37, 99, 235, 0.05);
            --us-border: rgba(37, 99, 235, 0.15);
            --uk-color: #dc2626;
            --uk-bg: rgba(220, 38, 38, 0.05);
            --uk-border: rgba(220, 38, 38, 0.15);
        }

        /* ==========================================================================
           2. الإعدادات الأساسية والتصفير (Reset & Typography)
           ========================================================================== */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif; 
            background: var(--bg-gradient); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* تخصيص شريط التمرير (Scrollbar) */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary); 
            border-radius: 10px;
            border: 3px solid #f1f5f9;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--dark); 
        }

        /* ==========================================================================
           3. الحركات والتأثيرات (Keyframes & Animations)
           ========================================================================== */
        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(40px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0.5); }
            70% { box-shadow: 0 0 0 20px rgba(var(--primary-rgb), 0); }
            100% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0); }
        }

        /* ==========================================================================
           4. الهيدر والعداد الزجاجي (Header & Glass Counter)
           ========================================================================== */
        header { 
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            text-align: center; 
            padding: 50px 20px 30px; 
            border-bottom: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            position: relative;
            z-index: 10;
        }
        
        h1 { 
            color: var(--dark);
            font-size: 3.2em; 
            font-weight: 900; 
            letter-spacing: -1px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .global-counter-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            padding: 15px 35px;
            border-radius: 50px;
            display: inline-block;
            margin: 15px auto;
            font-weight: 800;
            font-size: 1.3em;
            color: var(--dark);
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: 0.3s;
        }
        
        .global-counter-glass:hover {
            transform: scale(1.05);
            border-color: var(--primary);
        }

        .global-counter-glass span {
            color: var(--primary);
            font-size: 1.5em;
            margin: 0 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* ==========================================================================
           5. شريط اللكنات بأعلام الدول (Accent Selector)
           ========================================================================== */
        .accent-selector {
            margin: 25px auto 0; 
            display: inline-flex; 
            gap: 20px;
            background: rgba(255, 255, 255, 0.6); 
            padding: 12px; 
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 3px 10px rgba(0,0,0,0.04);
        }

        .accent-btn {
            display: flex; 
            align-items: center; 
            gap: 12px; 
            background: transparent; 
            border: none;
            padding: 12px 30px; 
            border-radius: 40px; 
            font-size: 1.2em; 
            font-weight: 800; 
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            color: var(--text-muted);
        }

        .accent-btn img { 
            width: 40px; 
            height: 40px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
            transition: 0.4s;
        }
        
        /* تأثيرات الأعلام عند التفعيل */
        .accent-btn#btn-us.active { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
            color: white; 
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); 
            transform: translateY(-4px); 
        }

        .accent-btn#btn-uk.active { 
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); 
            color: white; 
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.4); 
            transform: translateY(-4px); 
        }

        /* ==========================================================================
           6. شريط التنقل (Navigation Bar)
           ========================================================================== */
        .nav-bar {
            background: var(--dark);
            padding: 18px; 
            display: flex; 
            justify-content: center; 
            flex-wrap: wrap; 
            gap: 20px;
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        .nav-btn {
            background: rgba(255,255,255,0.08); 
            color: #e2e8f0; 
            border: 1px solid transparent;
            padding: 14px 30px; 
            border-radius: 35px; 
            font-size: 1.1em; 
            font-weight: 700;
            cursor: pointer; 
            transition: all 0.3s;
        }

        .nav-btn:hover { 
            background: rgba(255,255,255,0.15); 
            color: white; 
            transform: translateY(-2px);
        }

        .nav-btn.active { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 6px 20px rgba(0,0,0,0.3); 
            border-color: rgba(255,255,255,0.2);
        }

        /* ==========================================================================
           7. الكروت والأقسام (Cards & Grid)
           ========================================================================== */
        .container { 
            max-width: 1300px; 
            margin: 60px auto; 
            padding: 0 20px; 
            flex: 1; 
        }

        .section-header { 
            text-align: center; 
            margin-bottom: 50px; 
        }

        .section-header h2 { 
            font-size: 2.5em; 
            color: var(--dark); 
            font-weight: 900; 
            position: relative;
            display: inline-block;
        }

        .section-header h2::after {
            content: '';
            position: absolute;
            width: 50%;
            height: 5px;
            background: var(--primary);
            bottom: -15px;
            left: 25%;
            border-radius: 5px;
            transition: 0.3s;
        }

        .grid-layout { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 35px; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px);
            padding: 40px 30px; 
            border-radius: 28px; 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.9); 
            border-bottom: 8px solid var(--primary);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            cursor: pointer; 
            transition: all 0.4s ease;
            animation: fadeInUp 0.6s ease-out backwards;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.12); 
            background: white; 
        }

        .card h3 { 
            font-size: 1.6em; 
            color: var(--dark); 
            margin-bottom: 18px; 
            font-weight: 900; 
        }

        .badge { 
            background: #f1f5f9; 
            color: var(--primary); 
            padding: 10px 25px; 
            border-radius: 25px; 
            font-weight: 900; 
            font-size: 1em; 
            display: inline-block; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.03);
        }

        /* ==========================================================================
           8. النافذة المنبثقة (Modal & Glass Design)
           ========================================================================== */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: var(--modal-glass); 
            backdrop-filter: blur(15px); 
            z-index: 1000; 
            align-items: center; 
            justify-content: center; 
            padding: 30px; 
        }

        .modal-content { 
            background: linear-gradient(145deg, rgba(255,255,255,0.98) 0%, rgba(241,245,249,0.98) 100%); 
            backdrop-filter: blur(25px);
            width: 100%; 
            max-width: 1100px; 
            max-height: 85vh; 
            border-radius: 35px; 
            overflow-y: auto; 
            padding: 50px; 
            position: relative; 
            animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 40px 80px rgba(0,0,0,0.4); 
            border-top: 10px solid var(--primary);
        }

        .close-btn { 
            position: absolute; 
            top: 25px; 
            left: 30px; 
            font-size: 2.2em; 
            cursor: pointer; 
            color: #94a3b8; 
            background: white; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.08); 
        }
        
        .close-btn:hover { 
            background: var(--danger); 
            color: white; 
            transform: rotate(90deg);
        }

        .total-counter-badge { 
            background: var(--dark); 
            color: white; 
            padding: 8px 22px; 
            border-radius: 25px; 
            font-size: 0.55em; 
            vertical-align: middle; 
            margin-right: 20px; 
            display: inline-block; 
            font-weight: 900; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ==========================================================================
           9. تصميم محتوى المودال (Lists, Grammar, Chat)
           ========================================================================== */
        .list-item { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 1); 
            padding: 30px; 
            border-radius: 25px; 
            margin-bottom: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 25px; 
            border-right: 8px solid var(--primary); 
            transition: all 0.3s ease; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.04);
        }

        .list-item:hover { 
            background: white; 
            transform: translateX(-8px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.08); 
        }
        
        .num-circle { 
            background: var(--primary); 
            color: white; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.4em; 
            font-weight: 900; 
            flex-shrink: 0; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
        }
        
        .content-wrap { 
            flex-grow: 1; 
        }

        .eng-text { 
            font-size: 1.6em; 
            font-weight: 900; 
            color: var(--dark); 
            direction: ltr; 
            text-align: left; 
            margin-bottom: 12px; 
            line-height: 1.5; 
        }

        .ar-text { 
            font-size: 1.2em; 
            color: var(--text-muted); 
            font-weight: 700; 
            line-height: 1.6; 
        }
        
        /* المحادثات */
        .chat-layout { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }

        .chat-bubble { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px);
            padding: 30px; 
            border-radius: 25px; 
            border: 1px solid #e2e8f0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); 
            border-right: 5px solid var(--primary);
            transition: 0.3s;
        }

        .chat-bubble:hover {
            background: white;
            box-shadow: 0 12px 30px rgba(0,0,0,0.06);
        }

        .speaker-tag { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            background: var(--dark); 
            color: white; 
            padding: 8px 18px; 
            border-radius: 15px; 
            font-size: 1.05em; 
            font-weight: 900; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        /* زر الصوت */
        .sound-icon { 
            background: #f8fafc; 
            color: var(--primary); 
            border: 2px solid #e2e8f0; 
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            font-size: 1.8em; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            flex-shrink: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sound-icon:hover { 
            background: var(--primary); 
            color: white; 
            transform: scale(1.15) rotate(-5deg); 
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25); 
        }
        
        /* تاجات القواعد النحوية المطولة */
        .grammar-tag { 
            background: rgba(245, 158, 11, 0.1); 
            color: #b45309; 
            padding: 18px 25px; 
            border-radius: 18px; 
            font-size: 1.1em; 
            font-weight: 800; 
            margin-bottom: 20px; 
            display: block; 
            border: 2px dashed #fcd34d; 
            line-height: 1.8; 
        }

        /* ==========================================================================
           10. الفوتر الزجاجي الذهبي (Golden Glass Footer)
           ========================================================================== */
        footer { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(25px);
            text-align: center; 
            padding: 35px; 
            margin-top: auto; 
            border-top: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        }
        
        .made-by-gold {
            color: #94a3b8;
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: 1px;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            transition: 0.3s;
            cursor: default;
        }

        .made-by-gold:hover {
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }
        /* ==========================================================================
           11. التصميم المتجاوب (Responsive Design) للهواتف والتابلت
           ========================================================================== */
        @media screen and (max-width: 768px) {
            /* تصغير حجم الهيدر والعنوان الرئيسي ليناسب الشاشات الصغيرة */
            header {
                padding: 30px 15px 15px;
            }
            header h1 {
                font-size: 2em;
            }

            /* تعديل حجم العداد الزجاجي */
            .global-counter-glass {
                font-size: 1em;
                padding: 10px 20px;
            }
            .global-counter-glass span {
                font-size: 1.2em;
            }

            /* شريط اختيار اللكنات ليصبح عمودياً في الهواتف */
            .accent-selector {
                flex-direction: column;
                gap: 10px;
                width: 100%;
                border-radius: 25px;
            }
            .accent-btn {
                width: 100%;
                justify-content: center;
                padding: 10px 15px;
            }

            /* تعديل شريط التنقل ليناسب عرض الهاتف */
            .nav-bar {
                padding: 10px;
                gap: 10px;
            }
            .nav-btn {
                width: 100%;
                font-size: 1em;
                padding: 10px;
            }

            /* تعديل الكروت لتأخذ عرض الشاشة بالكامل في الهواتف */
            .grid-layout {
                grid-template-columns: 1fr;
            }

            /* تعديل النافذة المنبثقة (المودال) لتقليل الهوامش */
            .modal {
                padding: 10px;
            }
            .modal-content {
                padding: 35px 15px 20px;
                border-radius: 20px;
            }

            /* تصغير زر الإغلاق وضبط مكانه */
            .close-btn {
                top: 10px;
                left: 10px;
                width: 40px;
                height: 40px;
                font-size: 1.8em;
            }

            /* تعديل شكل عناصر الجمل والمحادثات لتصبح عمودية في الشاشات الضيقة */
            .list-item, .chat-bubble {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 15px;
                padding: 20px 15px;
            }

            /* ضبط أحجام النصوص لتكون مقروءة على التليفون */
            .eng-text {
                font-size: 1.3em;
                text-align: center;
            }
            .ar-text {
                font-size: 1em;
            }

            /* تصغير التاج الخاص بالقواعد والشخصيات */
            .speaker-tag, .grammar-tag {
                font-size: 0.9em;
                margin: 0 auto 10px auto;
                text-align: center;
            }
        }

        /* تعديلات إضافية للشاشات الصغيرة جداً */
        @media screen and (max-width: 480px) {
            .section-header h2 {
                font-size: 1.8em;
            }
            .made-by-gold {
                font-size: 1.3em;
            }
        }

        /* صناديق اللكنات للمقارنة */
        .comparison-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .accent-block {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-radius: 18px;
            border: 2px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            gap: 15px;
        }

        .accent-block .flag-icon {
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .accent-block .accent-text-wrap {
            flex-grow: 1;
            text-align: left;
            direction: ltr;
        }

        .accent-block .accent-label {
            font-size: 0.75em;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .accent-block.us {
            --accent-main: var(--us-color);
            --accent-bg: var(--us-bg);
            --accent-border: var(--us-border);
        }

        .accent-block.uk {
            --accent-main: var(--uk-color);
            --accent-bg: var(--uk-bg);
            --accent-border: var(--uk-border);
        }

        /* حالة التفعيل والتعطيل */
        .accent-block.active {
            border-color: var(--accent-main);
            background: var(--accent-bg);
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        
        .accent-block.active .accent-label {
            color: var(--accent-main);
        }

        .accent-block.active .eng-text {
            color: var(--dark);
            font-weight: 900;
        }

        .accent-block.inactive {
            opacity: 0.45;
            border-color: #f1f5f9;
            background: rgba(248, 250, 252, 0.3);
            filter: grayscale(40%);
        }

        .accent-block.inactive:hover {
            opacity: 0.75;
            filter: grayscale(0%);
        }

        .accent-block.inactive .accent-label {
            color: #94a3b8;
        }

        .accent-block.inactive .eng-text {
            color: var(--text-muted);
            font-weight: 700;
        }

        /* تخصيص زر الصوت لكل فئة */
        .accent-block .sound-icon-small {
            background: white;
            color: var(--text-muted);
            border: 2px solid #e2e8f0;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .accent-block.active .sound-icon-small {
            color: white;
            background: var(--accent-main);
            border-color: var(--accent-main);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .accent-block.active .sound-icon-small:hover {
            transform: scale(1.1) rotate(-5deg);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        .accent-block.inactive .sound-icon-small {
            cursor: pointer;
        }

        .accent-block.inactive .sound-icon-small:hover {
            border-color: #cbd5e1;
            color: var(--dark);
            transform: scale(1.05);
        }

        /* =========================================
           تنسيق هيكل العلم الثنائي
           ========================================= */
        .dual-flag-bar {
            height: 15px;
            width: 100%;

        /**
         * حساب العدد الإجمالي للجمل والمحادثات لتعزيز العداد الزجاجي
         */
        function calculateTotalItems() {
            let total = 444; // قاعدة الجمل الأساسية
            for(let category in DB) {
                for(let subCategory in DB[category]) {
                    total += DB[category][subCategory].items.length;
                }
            }
            // تحديث الرقم في الهيدر مع إضافة حركة بسيطة
            const counterElement = document.getElementById('global-count');
            if (counterElement) {
                counterElement.textContent = total;
                counterElement.style.animation = 'pulseGlow 2s infinite';
            }
        }

        /**
         * تحديث الألوان الديناميكية للـ CSS بناءً على اللكنة المختارة
         */
        function updateThemeColor() {
            const root = document.documentElement;
            if (accent === 'US') {
                root.style.setProperty('--primary', US_COLOR);
            } else {
                root.style.setProperty('--primary', UK_COLOR);
            }
        }

        /**
         * تغيير اللكنة والتحديث الشامل للواجهة
         */
        function setAccent(selectedAccent) {
            accent = selectedAccent;
            
            // تحديث حالة الأزرار
            document.getElementById('btn-us').classList.toggle('active', selectedAccent === 'US');
            document.getElementById('btn-uk').classList.toggle('active', selectedAccent === 'UK');
            
            // تغيير الألوان وإعادة رسم الشاشة
            updateThemeColor();
            renderUI();
            
            // إذا كانت النافذة المنبثقة مفتوحة، أعد رسمها أيضاً باللغة الجديدة
            const modal = document.getElementById('data-modal');
            if (modal.style.display === 'flex') {
                const activeKey = modal.getAttribute('data-active-key');
                if (activeKey) openModal(activeKey);
            }
        }

        /**
         * تغيير نظام العرض (جمل / محادثات / قواعد)
         */
        function setMode(selectedMode) {
            mode = selectedMode;
            
            // تحديث أزرار التنقل (Nav Bar)
            document.getElementById('nav-general').classList.toggle('active', selectedMode === 'general');
            document.getElementById('nav-conversation').classList.toggle('active', selectedMode === 'conversation');
            document.getElementById('nav-grammar').classList.toggle('active', selectedMode === 'grammar');
            
            // تغيير العنوان الرئيسي للصفحة
            const titles = { 
                general: 'الجمل اليومية والمفردات', 
                conversation: 'المحادثات الاحترافية والشخصيات', 
                grammar: 'القواعد الأكاديمية المفصلة' 
            };
            document.getElementById('main-title').textContent = titles[selectedMode];
            
            // إعادة رسم الكروت بناءً على النظام الجديد
            renderUI();
        }

        /**
         * رسم كروت الأقسام على الشاشة (Render Cards)
         */
        function renderUI() {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            
            let data = DB[mode];
            let animationDelay = 0;
            
            for (let key in data) {
                let itemCount = data[key].items.length;
                let card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = `${animationDelay}s`;
                card.innerHTML = `
                    <h3>${data[key].title}</h3>
                    <div class="badge">📚 يحتوي على ${itemCount} جمل / محادثات</div>
                `;
                
                // إضافة حدث النقر لفتح النافذة المنبثقة
                card.onclick = () => openModal(key);
                
                container.appendChild(card);
                animationDelay += 0.05; // تأخير تدريجي للحركة
            }
        }

        /**
         * نظام النطق بالذكاء الاصطناعي
         */
        function speak(text, forcedAccent) {
            if ('speechSynthesis' in window) {
                // إيقاف أي نطق سابق
                window.speechSynthesis.cancel();
                
                // تنظيف النص من علامات التنصيص لتجنب أخطاء برمجية
                let cleanText = text.replace(/'/g, "");
                
                let utterance = new SpeechSynthesisUtterance(cleanText);
                const currentAccent = forcedAccent || accent;
                utterance.lang = currentAccent === 'US' ? 'en-US' : 'en-GB';
                
                // تحسين جودة الصوت إن أمكن
                utterance.rate = 0.9; // أبطأ قليلاً ليكون أوضح للمتعلم
                utterance.pitch = 1.0;
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert("عذراً، متصفحك لا يدعم خاصية تحويل النص إلى كلام.");
            }
        }

        /**
         * فتح النافذة المنبثقة (Modal) وعرض محتوى القسم
         */
        function openModal(key) {
            const category = DB[mode][key];
            const itemCount = category.items.length;
            const modal = document.getElementById('data-modal');
            
            // تخزين المفتاح النشط لتحديثه عند تغيير اللكنة
            modal.setAttribute('data-active-key', key);
            
            // تحديث الهيدر مع العداد
            document.getElementById('modal-header').innerHTML = `
                ${category.title} 
                <span class="total-counter-badge">إجمالي: ${itemCount}</span>
            `;
            
            const body = document.getElementById('modal-body');
            body.innerHTML = '';

            // بناء المحتوى بناءً على النظام (محادثة أو جمل عادية/قواعد)
            if (mode === 'conversation') {
                let chatContainer = document.createElement('div');
                chatContainer.className = 'chat-layout';
                
                category.items.forEach((item, index) => {
                    let usActive = accent === 'US' ? 'active' : 'inactive';
                    let ukActive = accent === 'UK' ? 'active' : 'inactive';
                    let usTextEscaped = item.us.replace(/'/g, "\\'");
                    let ukTextEscaped = item.uk.replace(/'/g, "\\'");
                    
                    chatContainer.innerHTML += `
                        <div class="chat-bubble" style="flex-direction: column; align-items: stretch; border-right: 5px solid ${accent === 'US' ? US_COLOR : UK_COLOR};">
                            <div style="display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 10px; flex-wrap: wrap;">
                                <div class="speaker-tag" style="margin-bottom: 0;">🗣️ ${item.speaker}</div>
                                <div class="num-circle" style="width: 35px; height: 35px; font-size: 1.1em;">${index + 1}</div>
                            </div>
                            <div class="ar-text" style="font-size: 1.25em; font-weight: 800; color: var(--text-muted); text-align: right; margin-bottom: 15px;">${item.ar}</div>
                            <div class="comparison-container">
                                <div class="accent-block us ${usActive}">
                                    <div class="flag-icon">🇺🇸</div>
                                    <div class="accent-text-wrap">
                                        <div class="accent-label">اللكنة الأمريكية (US)</div>
                                        <div class="eng-text" style="font-size: 1.3em; margin-bottom: 0;">${item.us}</div>
                                    </div>
                                    <button class="sound-icon-small" onclick="speak('${usTextEscaped}', 'US')" title="استمع للنطق الأمريكي">🔊</button>
                                </div>
                                <div class="accent-block uk ${ukActive}">
                                    <div class="flag-icon">🇬🇧</div>
                                    <div class="accent-text-wrap">
                                        <div class="accent-label">اللكنة البريطانية (UK)</div>
                                        <div class="eng-text" style="font-size: 1.3em; margin-bottom: 0;">${item.uk}</div>
                                    </div>
                                    <button class="sound-icon-small" onclick="speak('${ukTextEscaped}', 'UK')" title="استمع للنطق البريطاني">🔊</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                body.appendChild(chatContainer);
            } else {
                // نظام القواعد أو الجمل العامة
                category.items.forEach((item, index) => {
                    let usActive = accent === 'US' ? 'active' : 'inactive';
                    let ukActive = accent === 'UK' ? 'active' : 'inactive';
                    let usTextEscaped = item.us.replace(/'/g, "\\'");
                    let ukTextEscaped = item.uk.replace(/'/g, "\\'");
                    let grammarTagHtml = item.rule ? `<div class="grammar-tag">${item.rule}</div>` : '';
                    
                    body.innerHTML += `
                        <div class="list-item" style="flex-direction: column; align-items: stretch; border-right: 8px solid ${accent === 'US' ? US_COLOR : UK_COLOR};">
                            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                                <div class="num-circle">${index + 1}</div>
                                <div class="ar-text" style="font-size: 1.3em; font-weight: 800; color: var(--dark); flex-grow: 1; text-align: right;">${item.ar}</div>
                            </div>
                            ${grammarTagHtml}
                            <div class="comparison-container">
                                <div class="accent-block us ${usActive}">
                                    <div class="flag-icon">🇺🇸</div>
                                    <div class="accent-text-wrap">
                                        <div class="accent-label">اللكنة الأمريكية (US)</div>
                                        <div class="eng-text" style="font-size: 1.35em; margin-bottom: 0;">${item.us}</div>
                                    </div>
                                    <button class="sound-icon-small" onclick="speak('${usTextEscaped}', 'US')" title="استمع للنطق الأمريكي">🔊</button>
                                </div>
                                <div class="accent-block uk ${ukActive}">
                                    <div class="flag-icon">🇬🇧</div>
                                    <div class="accent-text-wrap">
                                        <div class="accent-label">اللكنة البريطانية (UK)</div>
                                        <div class="eng-text" style="font-size: 1.35em; margin-bottom: 0;">${item.uk}</div>
                                    </div>
                                    <button class="sound-icon-small" onclick="speak('${ukTextEscaped}', 'UK')" title="استمع للنطق البريطاني">🔊</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            // إظهار المودال
            modal.style.display = 'flex';

            // نطق تلقائي إذا كان الخيار مفعلاً
            const autoPronounce = document.getElementById('auto-pronounce-toggle');
            if (autoPronounce && autoPronounce.checked && category.items.length > 0) {
                setTimeout(() => {
                    const firstItem = category.items[0];
                    const firstText = accent === 'US' ? firstItem.us : firstItem.uk;
                    speak(firstText, accent);
                }, 400);
            }
        }

        /**
         * إغلاق النافذة المنبثقة
         */
        function closeModal() { 
            const modal = document.getElementById('data-modal');
            modal.style.display = 'none'; 
            modal.removeAttribute('data-active-key');
            
            // إيقاف الصوت عند الإغلاق
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        }

        // إغلاق النافذة عند النقر خارجها (على الخلفية الزجاجية)
        window.onclick = function(event) {
            const modal = document.getElementById('data-modal');
            const addWordModal = document.getElementById('add-word-modal');
            if (event.target == modal) {
                closeModal();
            }
            if (event.target == addWordModal) {
                closeAddWordModal();
            }
        }

        // ==========================================================================
        // وظائف إضافة الجمل والقاموس المحلي (Add Word & LocalStorage)
        // ==========================================================================
        function openAddWordModal() {
            const select = document.getElementById('new-category');
            select.innerHTML = '';
            
            // تعبئة الأقسام ديناميكياً
            for (let modeKey in DB) {
                for (let catKey in DB[modeKey]) {
                    let option = document.createElement('option');
                    option.value = `${modeKey}:${catKey}`;
                    let modeName = modeKey === 'general' ? 'جمل' : modeKey === 'conversation' ? 'محادثة' : 'قواعد';
                    option.textContent = `[${modeName}] - ${DB[modeKey][catKey].title}`;
                    select.appendChild(option);
                }
            }
            
            document.getElementById('add-word-modal').style.display = 'flex';
        }

        function closeAddWordModal() {
            document.getElementById('add-word-modal').style.display = 'none';
        }

        function submitNewWord(event) {
            event.preventDefault();
            const selectVal = document.getElementById('new-category').value.split(':');
            const targetMode = selectVal[0];
            const targetCategory = selectVal[1];
            
            const usText = document.getElementById('new-us').value.trim();
            const ukText = document.getElementById('new-uk').value.trim();
            const arText = document.getElementById('new-ar').value.trim();
            const speakerText = document.getElementById('new-speaker').value.trim();
            const ruleText = document.getElementById('new-rule').value.trim();

            if (!usText || !ukText || !arText) {
                alert("يرجى ملء الحقول الإلزامية.");
                return;
            }
            
            const newItem = {
                mode: targetMode,
                category: targetCategory,
                us: usText,
                uk: ukText,
                ar: arText,
                speaker: speakerText,
                rule: ruleText
            };
            
            // الحفظ في LocalStorage
            let localDB = JSON.parse(localStorage.getItem('english_learning_local_db')) || [];
            localDB.push(newItem);
            localStorage.setItem('english_learning_local_db', JSON.stringify(localDB));
            
            // الإضافة إلى قاعدة البيانات النشطة في الذاكرة
            DB[targetMode][targetCategory].items.push({
                us: usText,
                uk: ukText,
                ar: arText,
                speaker: speakerText,
                rule: ruleText
            });
            
            // إعادة تعيين النموذج وإغلاقه
            document.getElementById('add-word-form').reset();
            closeAddWordModal();
            
            // تحديث الإحصائيات ورسم الواجهة
            calculateTotalItems();
            renderUI();
            
            alert("تم حفظ الجملة الجديدة بنجاح وإضافتها لمجموعتك التعليمية! 🎉");
        }

        function loadLocalData() {
            let localData = localStorage.getItem('english_learning_local_db');
            if (localData) {
                try {
                    let parsed = JSON.parse(localData);
                    parsed.forEach(item => {
                        if (DB[item.mode] && DB[item.mode][item.category]) {
                            // التحقق من عدم التكرار
                            let exists = DB[item.mode][item.category].items.some(x => x.us === item.us || x.uk === item.uk);
                            if (!exists) {
                                DB[item.mode][item.category].items.push({
                                    us: item.us,
                                    uk: item.uk,
                                    ar: item.ar,
                                    speaker: item.speaker || "",
                                    rule: item.rule || ""
                                });
                            }
                        }
                    });
                } catch(e) {
                    console.error("Error loading local data", e);
                }
            }
        }

        // ==========================================================================
        // محرك الامتحانات وتحدي الـ 50 سؤال (Quiz Engine)
        // ==========================================================================
        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let quizScore = parseInt(localStorage.getItem('english_learning_quiz_score')) || 0;

        function updateScoreDisplay() {
            const scoreDisp = document.getElementById('score-display');
            if (scoreDisp) scoreDisp.textContent = quizScore;
        }

        function generateQuizQuestions() {
            let allItems = [];
            for (let modeKey in DB) {
                for (let catKey in DB[modeKey]) {
                    DB[modeKey][catKey].items.forEach(item => {
                        allItems.push({ ...item, categoryTitle: DB[modeKey][catKey].title });
                    });
                }
            }
            
            // ترتيب عشوائي للجمل
            allItems.sort(() => Math.random() - 0.5);
            
            let questions = [];
            
            for (let i = 0; i < allItems.length; i++) {
                let item = allItems[i];
                
                // النوع الأول: الترجمة من الإنجليزية إلى العربية
                questions.push({
                    type: 'translation',
                    question: `ما هي الترجمة العربية الصحيحة للجملة التالية؟<br><strong style="font-size: 1.25em; display:block; margin-top:10px; color:var(--primary); direction:ltr; text-align:center;">${item.us}</strong>`,
                    correct: item.ar,
                    options: [item.ar]
                });
                
                // النوع الثاني: الفروق اللفظية والمفردات بين الأمريكي والبريطاني (إذا اختلفا)
                if (item.us !== item.uk) {
                    questions.push({
                        type: 'us_vs_uk',
                        question: `كيف تُكتب هذه الجملة باللكنة البريطانية (🇬🇧 UK)؟<br>🇺🇸 الأمريكية: <strong style="font-size: 1.2em; display:block; margin-top:10px; color:var(--us-color); direction:ltr; text-align:center;">${item.us}</strong>`,
                        correct: item.uk,
                        options: [item.uk]
                    });
                    
                    questions.push({
                        type: 'uk_vs_us',
                        question: `كيف تُكتب هذه الجملة باللكنة الأمريكية (🇺🇸 US)؟<br>🇬🇧 البريطانية: <strong style="font-size: 1.2em; display:block; margin-top:10px; color:var(--uk-color); direction:ltr; text-align:center;">${item.uk}</strong>`,
                        correct: item.us,
                        options: [item.us]
                    });
                }
            }
            
            // ملء الخيارات الخاطئة لكل سؤال
            questions.forEach(q => {
                let incorrect = [];
                if (q.type === 'translation') {
                    let pool = allItems.map(x => x.ar).filter(ar => ar !== q.correct);
                    pool = [...new Set(pool)];
                    pool.sort(() => Math.random() - 0.5);
                    incorrect = pool.slice(0, 3);
                } else if (q.type === 'us_vs_uk') {
                    let pool = allItems.map(x => x.uk).filter(uk => uk !== q.correct);
                    pool = [...new Set(pool)];
                    pool.sort(() => Math.random() - 0.5);
                    incorrect = pool.slice(0, 3);
                } else if (q.type === 'uk_vs_us') {
                    let pool = allItems.map(x => x.us).filter(us => us !== q.correct);
                    pool = [...new Set(pool)];
                    pool.sort(() => Math.random() - 0.5);
                    incorrect = pool.slice(0, 3);
                }
                
                q.options = [q.correct, ...incorrect];
                q.options.sort(() => Math.random() - 0.5);
            });
            
            questions.sort(() => Math.random() - 0.5);
            return questions.slice(0, 50);
        }

        function startQuizSession() {
            quizQuestions = generateQuizQuestions();
            currentQuestionIndex = 0;
            
            document.getElementById('quiz-progress-container').style.display = 'block';
            showQuizQuestion();
        }

        function showQuizQuestion() {
            if (currentQuestionIndex >= quizQuestions.length) {
                document.getElementById('quiz-content').innerHTML = `
                    <h3 style="color: var(--success); font-size: 2em; font-weight:900;">تهانينا! 🎉</h3>
                    <p style="font-size: 1.3em; margin: 15px 0; font-weight:700;">لقد أتممت تحدي الـ 50 سؤال بنجاح.</p>
                    <p style="font-size: 1.25em; font-weight:700;">رصيدك الحالي هو: <strong style="color:var(--gold); font-size:1.5em;">${quizScore}</strong> نقطة.</p>
                    <button class="quiz-btn" onclick="startQuizSession()" style="border-radius:20px;">ابدأ تحدياً جديداً 🔄</button>
                `;
                document.getElementById('quiz-options').innerHTML = '';
                document.getElementById('quiz-feedback').innerHTML = '';
                document.getElementById('next-btn-container').innerHTML = '';
                return;
            }
            
            const q = quizQuestions[currentQuestionIndex];
            
            // تحديث شريط التقدم
            const progressPercent = (currentQuestionIndex / quizQuestions.length) * 100;
            document.getElementById('quiz-progress-fill').style.width = `${progressPercent}%`;
            
            document.getElementById('quiz-content').innerHTML = `
                <div class="question-counter">السؤال ${currentQuestionIndex + 1} من ${quizQuestions.length}</div>
                <p class="quiz-question">${q.question}</p>
            `;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            q.options.forEach(option => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span>${option}</span>`;
                btn.onclick = () => checkQuizAnswer(btn, option, q.correct);
                optionsContainer.appendChild(btn);
            });
            
            document.getElementById('quiz-feedback').innerHTML = '';
            document.getElementById('next-btn-container').innerHTML = '';
        }

        function checkQuizAnswer(selectedBtn, chosen, correct) {
            const buttons = document.querySelectorAll('#quiz-options .option-btn');
            buttons.forEach(btn => btn.disabled = true);
            
            const feedback = document.getElementById('quiz-feedback');
            const nextContainer = document.getElementById('next-btn-container');
            
            if (chosen === correct) {
                selectedBtn.classList.add('correct-answer');
                feedback.innerHTML = '<span style="color: var(--success);">إجابة صحيحة! ممتاز! 🥳</span>';
                
                // نطق الإجابة الصحيحة تلقائياً
                if (quizQuestions[currentQuestionIndex].type !== 'translation') {
                    speak(correct);
                }
                
                quizScore += 10;
                localStorage.setItem('english_learning_quiz_score', quizScore);
                updateScoreDisplay();
            } else {
                selectedBtn.classList.add('wrong-answer');
                feedback.innerHTML = `<span style="color: var(--danger);">إجابة خاطئة! 😢 الإجابة الصحيحة هي:<br><strong>${correct}</strong></span>`;
                
                buttons.forEach(btn => {
                    if (btn.textContent.trim() === correct) {
                        btn.classList.add('correct-answer');
                    }
                });
            }
            
            nextContainer.innerHTML = `
                <button class="quiz-btn" onclick="nextQuizQuestion()" style="border-radius:20px;">السؤال التالي ➡️</button>
            `;
        }

        function nextQuizQuestion() {
            currentQuestionIndex++;
            showQuizQuestion();
        }

        // ==========================================================================
        // التشغيل المبدئي للتطبيق (Initialization)
        // ==========================================================================
        window.onload = function() {
            loadLocalData();
            calculateTotalItems();
            updateThemeColor();
            setMode('general');
            updateScoreDisplay();
        };

    </script>
</body>
</html>
